name: Badminton Notifier

on:
  schedule:
    - cron: '*/5 * * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notify-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - uses: actions/cache/restore@v4
        id: restore-db
        with:
          path: slots.db
          key: slots-db-${{ github.run_id }}
          restore-keys: slots-db-

      - run: uv run main.py notify changes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - uses: actions/cache/save@v4
        if: always()
        with:
          path: slots.db
          key: slots-db-${{ github.run_id }}

  notify-current:
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - run: uv run main.py notify current
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
